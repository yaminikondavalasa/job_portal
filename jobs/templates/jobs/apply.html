<!DOCTYPE html>
<html>
<head>
    <title>Apply for {{ job.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3>Apply for {{ job.title }}</h3>
                    <p class="text-muted">{{ job.company }} - {{ job.location }}</p>
                    <hr>
                    
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Upload Resume (PDF only)</label>
                            <input type="file" name="resume" class="form-control" accept=".pdf" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Submit Application</button>
                    </form>
                    
                    <a href="{% url 'jobs:job_detail' job.id %}" class="btn btn-link mt-2">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Apply - JobHunt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'jobs:home' %}">💼 JobHunt</a>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="mb-3">Apply for {{ job.title }}</h3>
                <p><strong>{{ job.company_name }}</strong> - {{ job.location }}</p>
                <hr>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Submit Application</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
